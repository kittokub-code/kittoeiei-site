<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Special Person</title>
    <style>
        /* สไตล์หลักแบบ Dark Aesthetic */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; /* สีดำสนิท */
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            text-align: center;
            padding: 40px 20px;
        }

        /* ตกแต่งตัวอักษรนีออน */
        h1 {
            font-size: 2.5rem;
            color: #bf94ff; /* สีม่วงอ่อน */
            text-shadow: 0 0 10px #7b2cbf, 0 0 20px #7b2cbf;
            margin-bottom: 10px;
        }

        .subtitle {
            font-style: italic;
            color: #888;
            margin-bottom: 40px;
        }

        /* ส่วนแสดงรูปโปรการ์ด */
        .card-display {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .card-display:hover {
            transform: scale(1.02);
            border-color: #7b2cbf;
        }

        .card-display img {
            max-width: 100%;
            border-radius: 10px;
            display: block;
        }

        /* ข้อความภาษาเยอรมันที่เลือกไว้ */
        .message-box {
            margin-top: 30px;
            padding: 20px;
            font-size: 1.2rem;
            line-height: 1.6;
            border-left: 4px solid #7b2cbf;
            background: rgba(123, 44, 191, 0.1);
        }

        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Für Dich</h1> <!-- แปลว่า For You ในภาษาเยอรมัน -->
        <p class="subtitle">A little something to keep you going.</p>

        <div class="card-display">
            <!-- ใส่ชื่อไฟล์รูปโปรการ์ดของคุณตรงนี้ -->
            <img src="ForYou.png" alt="Pro Card">
        </div>

        <div class="message-box">
            „Ich sehe, wie viel Herzblut du in deine Arbeit steckst, und ich bin unglaublich stolz auf dich.“
        </div>
    </div>

    <footer class="footer">
        Created with love &copy; 2026
    </footer>

</body>
</html>
